<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>女巫精油膏配方書</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family:"Noto Sans TC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color:#f8f0df; background: radial-gradient(circle at 10% 0%, rgba(93,40,111,.45), transparent 28%), radial-gradient(circle at 88% 18%, rgba(36,95,72,.34), transparent 30%), #0f0b18; min-height:100vh; }
  .wrap { width:min(1100px, 100%); margin:0 auto; padding:28px 18px 56px; }
  .hero, .panel, .notice, .card { border:1px solid rgba(230,210,165,.18); background:rgba(255,255,255,.07); box-shadow:0 22px 55px rgba(0,0,0,.24); backdrop-filter: blur(12px); }
  .hero { border-radius:28px; padding:34px 26px; background:linear-gradient(135deg, rgba(47,38,78,.88), rgba(20,54,43,.82)); position:relative; overflow:hidden; }
  .hero:after { content:"✦"; position:absolute; right:32px; top:26px; color:rgba(232,217,165,.34); font-size:72px; }
  .eyebrow { color:#e6cd8a; font-weight:800; letter-spacing:.1em; font-size:13px; margin-bottom:10px; }
  h1 { margin:0; font-size:clamp(36px,6vw,58px); letter-spacing:.03em; line-height:1.12; }
  .subtitle { margin:14px 0 0; color:#d8cfc4; line-height:1.8; font-size:16px; max-width:720px; }
  .panel { margin-top:22px; border-radius:24px; padding:22px; }
  label { display:block; color:#ead491; font-weight:800; margin-bottom:10px; }
  .search-row { display:flex; gap:12px; align-items:center; }
  input { flex:1; min-width:0; border:1px solid rgba(230,210,165,.26); border-radius:18px; padding:15px 16px; background:#14101c; color:#fff; font-size:16px; outline:none; }
  input:focus { border-color:#dfc879; box-shadow:0 0 0 4px rgba(223,200,121,.13); }
  button { border:0; border-radius:999px; padding:14px 22px; font-weight:900; font-size:16px; cursor:pointer; white-space:nowrap; }
  .primary { color:#17101c; background:linear-gradient(135deg, #eadb91, #a8cf8c); }
  .secondary { color:#f4ead8; background:rgba(255,255,255,.13); border:1px solid rgba(255,255,255,.13); }
  .meta { margin-top:12px; color:#bfb3a7; font-size:14px; line-height:1.7; }
  h2 { color:#f0d88f; font-size:24px; margin:30px 0 16px; }
  .notice { border-radius:22px; padding:20px 22px; color:#ded4c8; line-height:1.8; }
  .results { display:grid; grid-template-columns:1fr; gap:16px; }
  @media (min-width:760px) { .results { grid-template-columns:repeat(2, minmax(0, 1fr)); } }
  .card { border-radius:22px; padding:22px; }
  .card h3 { margin:0 0 12px; color:#fff2bd; font-size:22px; }
  .badge-row { display:flex; gap:8px; flex-wrap:wrap; margin:10px 0 16px; }
  .badge { display:inline-flex; border-radius:999px; padding:6px 10px; background:rgba(159,204,134,.14); border:1px solid rgba(159,204,134,.24); color:#dbf6ce; font-size:13px; }
  .list { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px; }
  .list li { display:grid; grid-template-columns:1fr auto auto; gap:10px; align-items:center; padding:11px 12px; border-radius:14px; background:rgba(0,0,0,.2); }
  .name { font-weight:800; }
  .en { color:#aaa0a0; font-size:13px; }
  .amount { color:#ead491; white-space:pre-line; text-align:right; }
  .type { color:#c4b6cc; font-size:13px; text-align:right; }
  mark { background:rgba(234,219,145,.28); color:#fff5c4; padding:0 .14em; border-radius:4px; }
  @media (max-width:640px) { .search-row { flex-direction:column; align-items:stretch; } button { width:100%; } .hero { padding:28px 22px; } .list li { grid-template-columns:1fr; } .amount,.type { text-align:left; } }
</style>
</head>
<body>
<main class="wrap">
  <section class="hero">
    <div class="eyebrow">🌿 WITCH BALM FORMULA BOOK</div>
    <h1>女巫精油膏配方書</h1>
    <p class="subtitle">輸入精油膏名稱或成分名稱，就能查詢可製作的精油膏與完整材料。</p>
  </section>

  <section class="panel">
    <label for="keyword">搜尋精油膏名稱或成分名稱</label>
    <div class="search-row">
      <input id="keyword" type="search" placeholder="例如：財富、檀香、Sandalwood、蜜蠟、荷荷巴油" autocomplete="off" />
      <button class="primary" id="searchBtn">搜尋</button>
      <button class="secondary" id="clearBtn">清除</button>
    </div>
    <div class="meta" id="meta">配方資料載入中...</div>
  </section>

  <h2>🔮 查詢結果</h2>
  <section id="result" class="results"></section>
</main>
<script>
const CSV_FILE = 'Potions-Formula.csv';
const BACKUP_CSV = "原料名稱,英文名稱,類型,財富藥膏,驅邪藥膏,無毒飛天藥膏#2,\"《房間之主》\n語氣膏\"\n,,,,,,\n蜜蠟,,藥膏基底,5g,5g,5g,5g\n荷荷巴油,Jojoba,基底油,20ml,20ml,20ml,20ml\n羅勒,Basil,精油,1,,,\n丁香,Clove,精油,1,1,,\n廣藿香,Patchouli,精油,4,,,\n岩蘭草,Vetiver,精油,\"3\n(橡木苔特調配方)\",,,5\n肉桂,Cinnamon,精油,\"3\n(橡木苔特調配方)\",,,\n橡木苔,Oakmoss,精油,3,,,\n檀香,Sandalwood,精油,,,2,\n茉莉,Jasmine,精油,,,1,\n安息香,,精油,,,1,\n肉豆蔻皮,Mace,精油,,,1,\n乳香,Frankincense,精油,,3,,\n胡椒薄荷,Peppermint,精油,,2,,\n松樹,Pine,精油,,1,,\n龍延香,Ambergris oil,精油,,,,\n羅馬洋甘菊,\"Chamomile, Roman\",,,,,3\n檸檬馬鞭草,,,,,,\"5\n(或)\"\n苦橙葉,Petitgrain,,,,,\"5\n(或)\"\n西印度檀香 Amyris,,精油,,,,\n歐白芷 Angelica,,精油,,,,\n大茴香籽 Anise Seed,,精油,,,,\n月桂 Bay Laurel,,精油,,,,\n佛手柑 Bergamot,,精油,,,,\n黑胡椒 Black Pepper,,精油,,,,\n白千層 Cajeput,,精油,,,,\n藏茴香 Caraway Seed,,精油,,,,\n小荳蔻 Cardamom,,精油,,,,\n野胡蘿蔔籽 Carrot Seed,,精油,,,,\n兩種雪松精油,,,,,,\n\"大西洋雪松 Cedarwood, Atlas\",,,,,,\n\"維吉尼亞雪松 Cedarwood, Virginia\",,,,,,\n兩種洋甘菊精油,,,,,,\n\"德國洋甘菊 Chamomile, German\",,,,,,\n肉桂葉 Cinnamon Leaf,,,,,,\n香茅 Citronella,,,,,,\n快樂鼠尾草,,,,,,\n芫荽籽 Coriander,,,,,,\n絲柏 Cypress,,,,,,\n欖香脂 Elemi,,,,,,\n兩種尤加利精油,,,,,,\n\"藍膠尤加利 Eucalyptus, Blue\",,,,,,\n\"檸檬尤加利 Eucalyptus, Lemon\",,,,,,\n\"甜茴香 Fennel, Sweet\",,,,,,\n冷杉 Fir Needle,,,,,,\n天竺葵 Geranium,,,,,,\n生薑 Ginger,,,,,,\n葡萄柚 Grapefruit,,,,,,\n永久花 Helichrysum,,,,,,\n牛膝草 Hyssop,,,,,,\n杜松漿果 Juniper Berry,,,,,,\n薰衣草 Lavender,,,,,,\n檸檬 Lemon,,,,,,\n香蜂草 Lemon Balm,,,,,,\n\"東印度檸檬草 Lemongrass, East Indian\",,,,,,\n\"西印度檸檬草 Lemongrass, West Indian\",,,,,,\n萊姆 Lime,,,,,,\n柑橘 Mandarin,,,,,,\n松紅梅 Manuka,,,,,,\n甜馬鬱蘭 Marjoram,,,,,,\n兩種薄荷精油,,,,,,\n綠薄荷 Spearmint,,,,,,\n沒藥 Myrrh,,,,,,\n綠花白千層 Niaouli,,,,,,\n柑橘類精油,,,,,,\n橙花 Neroli,,,,,,\n甜橙 Orange,,,,,,\n玫瑰草 Palmarosa,,,,,,\n羅文莎葉 Ravintsara,,,,,,\n玫瑰 Rose,,,,,,\n迷迭香 Rosemary,,,,,,\n快樂鼠尾草 Clary Sage,,,,,,\n西班牙鼠尾草 Spanish Sage,,,,,,\n茶樹 Tea Tree,,,,,,\n百里香 Thyme,,,,,,\n伊蘭伊蘭 Ylang-Ylang,,,,,,\n甜杏仁油,\"Almond, Sweet\",基底油,,,,\n杏桃核仁油,Apricot,基底油,,,,\n酪梨油,Avocado,基底油,,,,\n琉璃苣油,Borage,基底油,,,,\n椰子油 Coconut,,基底油,,,,\n月見草油 Evening Primrose,,基底油,,,,\n榛果油 Hazelnut,,基底油,,,,\n橄欖油 Olive,,基底油,,,,\n玫瑰果油 Rosehip Seed,,基底油,,,,\n芝麻油 Sesame,,基底油,,,,\n葵花油 Sunflower,,基底油,,,,\n浸泡油,,基底油,,,,\n金盞花油 Calendula,,基底油,,,,";
let recipes = [];

const el = {
  keyword: document.getElementById('keyword'),
  searchBtn: document.getElementById('searchBtn'),
  clearBtn: document.getElementById('clearBtn'),
  result: document.getElementById('result'),
  meta: document.getElementById('meta')
};

function escapeHTML(value) {
  return String(value ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#039;');
}

function normalize(value) {
  return String(value ?? '').toLowerCase().replace(/\s+/g, '').trim();
}

function parseCSV(text) {
  const rows = [];
  let row = [], cell = '', quote = false;
  text = String(text || '').replace(/^﻿/, '');
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i + 1];
    if (c === '"' && quote && n === '"') { cell += '"'; i++; }
    else if (c === '"') { quote = !quote; }
    else if (c === ',' && !quote) { row.push(cell.trim()); cell = ''; }
    else if ((c === '
' || c === '') && !quote) {
      if (c === '' && n === '
') i++;
      row.push(cell.trim());
      if (row.some(x => x !== '')) rows.push(row);
      row = []; cell = '';
    } else { cell += c; }
  }
  row.push(cell.trim());
  if (row.some(x => x !== '')) rows.push(row);
  return rows;
}

function buildRecipes(csvText) {
  const rows = parseCSV(csvText);
  if (rows.length < 2) return [];
  const header = rows[0];
  const recipeHeaders = header.slice(3).map(h => h.trim()).filter(Boolean);
  return recipeHeaders.map((recipeName, recipeOffset) => {
    const colIndex = recipeOffset + 3;
    const ingredients = rows.slice(1).map(r => {
      const amount = (r[colIndex] || '').trim();
      if (!amount) return null;
      return {
        name: (r[0] || '').trim(),
        english: (r[1] || '').trim(),
        type: (r[2] || '').trim(),
        amount
      };
    }).filter(Boolean);
    return { name: recipeName, ingredients };
  }).filter(r => r.name && r.ingredients.length);
}

async function loadRecipes() {
  let text = BACKUP_CSV;
  try {
    // 放在 GitHub Pages 時，會優先讀取同資料夾最新 CSV。
    const response = await fetch(`${CSV_FILE}?v=${Date.now()}`, { cache: 'no-store' });
    if (response.ok) text = await response.text();
  } catch (e) {
    // 本機直接開 HTML 時，fetch 可能被瀏覽器擋下；此時使用內建備用資料，畫面仍可使用。
  }

  recipes = buildRecipes(text);
  const ingredientCount = new Set(recipes.flatMap(r => r.ingredients.map(i => normalize(i.name)))).size;
  el.meta.textContent = recipes.length
    ? `已收錄 ${recipes.length} 款精油膏、${ingredientCount} 筆原料。`
    : '目前沒有讀取到配方資料。';
  renderEmpty();
}

function highlight(text, keyword) {
  const raw = String(text ?? '');
  const key = String(keyword ?? '').trim();
  if (!key) return escapeHTML(raw);
  const safe = key.replace(/[.*+?^${}()|[\]\]/g, '\$&');
  return escapeHTML(raw).replace(new RegExp(`(${safe})`, 'gi'), '<mark>$1</mark>');
}

function search() {
  const keyword = el.keyword.value.trim();
  if (!keyword) {
    renderNotice('請先輸入想搜尋的精油膏名稱或成分名稱，例如：財富、檀香、蜜蠟。');
    return;
  }

  const q = normalize(keyword);
  const matched = recipes.filter(recipe => {
    if (normalize(recipe.name).includes(q)) return true;
    return recipe.ingredients.some(i =>
      normalize(i.name).includes(q) ||
      normalize(i.english).includes(q) ||
      normalize(i.type).includes(q)
    );
  });

  if (!matched.length) {
    renderNotice(`目前找不到與「${escapeHTML(keyword)}」相關的精油膏。可以改用較短的名稱搜尋，例如「檀香」或「財富」。`);
    return;
  }

  el.result.innerHTML = matched.map(recipe => renderCard(recipe, keyword)).join('');
}

function renderCard(recipe, keyword) {
  const matchedIngredients = recipe.ingredients.filter(i =>
    normalize(i.name).includes(normalize(keyword)) ||
    normalize(i.english).includes(normalize(keyword)) ||
    normalize(i.type).includes(normalize(keyword))
  );

  const badges = matchedIngredients.length
    ? `<div class="badge-row">${matchedIngredients.map(i => `<span class="badge">符合：${escapeHTML(i.name)}</span>`).join('')}</div>`
    : '';

  return `
    <article class="card">
      <h3>${highlight(recipe.name, keyword)}</h3>
      ${badges}
      <ul class="list">
        ${recipe.ingredients.map(i => `
          <li>
            <div>
              <div class="name">${highlight(i.name, keyword)}</div>
              ${i.english ? `<div class="en">${highlight(i.english, keyword)}</div>` : ''}
            </div>
            <div class="type">${escapeHTML(i.type)}</div>
            <div class="amount">${escapeHTML(i.amount)}</div>
          </li>
        `).join('')}
      </ul>
    </article>
  `;
}

function renderNotice(message) {
  el.result.innerHTML = `<div class="notice">${message}</div>`;
}

function renderEmpty() {
  if (!recipes.length) {
    renderNotice('目前沒有讀取到配方資料，請確認 CSV 檔案是否與網頁放在同一個資料夾。');
    return;
  }
  renderNotice(`可以搜尋：${recipes.map(r => escapeHTML(r.name)).join('、')}，或輸入任一成分名稱。`);
}

el.searchBtn.addEventListener('click', search);
el.keyword.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
el.clearBtn.addEventListener('click', () => { el.keyword.value = ''; renderEmpty(); el.keyword.focus(); });
loadRecipes();
</script>
</body>
</html>
