<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>女巫精油膏配方書</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f6f0e7;
      background:
        radial-gradient(circle at 12% 0%, rgba(96, 47, 137, .55), transparent 34%),
        radial-gradient(circle at 85% 15%, rgba(39, 88, 68, .52), transparent 32%),
        linear-gradient(180deg, #18101f 0%, #0f0b16 58%, #0b0910 100%);
    }
    .page { width: min(1120px, 100%); margin: 0 auto; padding: 28px 20px 64px; }
    .hero {
      border: 1px solid rgba(224, 204, 150, .22);
      border-radius: 30px;
      padding: 34px 28px;
      background: linear-gradient(135deg, rgba(41, 31, 66, .9), rgba(18, 51, 43, .78));
      box-shadow: 0 24px 70px rgba(0, 0, 0, .34);
      position: relative;
      overflow: hidden;
    }
    .hero::after { content: "✦"; position: absolute; right: 34px; top: 28px; font-size: 82px; color: rgba(226, 214, 158, .34); }
    .eyebrow { margin-bottom: 10px; color: #e2cd8e; font-size: 14px; letter-spacing: .1em; font-weight: 800; }
    h1 { margin: 0; font-size: clamp(38px, 6vw, 62px); line-height: 1.08; letter-spacing: .03em; }
    .hero p { margin: 18px 0 0; max-width: 760px; color: #ddd3c8; font-size: 17px; line-height: 1.75; }
    .panel {
      margin-top: 24px;
      padding: 22px;
      border-radius: 26px;
      background: rgba(255, 255, 255, .075);
      border: 1px solid rgba(255, 255, 255, .13);
      box-shadow: 0 16px 48px rgba(0,0,0,.22);
    }
    label { display: block; margin-bottom: 12px; color: #ead491; font-weight: 800; }
    .search-row { display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: center; }
    input {
      width: 100%; min-height: 56px; padding: 0 18px; border-radius: 18px;
      border: 1px solid rgba(226, 205, 142, .28); outline: none;
      background: rgba(18, 13, 24, .85); color: #fff8e8; font-size: 16px;
    }
    input:focus { border-color: #dec978; box-shadow: 0 0 0 4px rgba(222,201,120,.14); }
    button {
      min-height: 56px; border: 0; border-radius: 999px; padding: 0 24px;
      font-size: 16px; font-weight: 900; cursor: pointer; transition: transform .15s ease, opacity .15s ease;
    }
    button:hover { transform: translateY(-1px); }
    .primary { background: linear-gradient(135deg, #e0d68a, #a9d38e); color: #18101f; }
    .secondary { background: rgba(255,255,255,.13); color: #f7ead6; border: 1px solid rgba(255,255,255,.14); }
    .meta { margin-top: 12px; color: #c9bfb5; font-size: 14px; }
    .message { margin-top: 16px; padding: 14px 16px; border-radius: 18px; background: rgba(0,0,0,.18); color: #e9dfd0; line-height: 1.7; }
    .message.error { background: rgba(130, 49, 62, .28); border: 1px solid rgba(215, 92, 110, .35); }
    .section-title { margin: 34px 0 16px; font-size: 24px; color: #efd894; }
    .results { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
    .card {
      border-radius: 24px; padding: 22px;
      border: 1px solid rgba(255,255,255,.13);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.055));
      box-shadow: 0 14px 34px rgba(0,0,0,.22);
    }
    .card h3 { margin: 0 0 14px; color: #fff3c8; font-size: 23px; }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 16px; }
    .tag { border-radius: 999px; padding: 6px 10px; color: #dcefd5; background: rgba(145, 191, 125, .16); border: 1px solid rgba(145,191,125,.22); font-size: 13px; }
    .ingredient-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; }
    .ingredient-list li { display: grid; grid-template-columns: 1fr auto; gap: 12px; padding: 10px 12px; border-radius: 14px; background: rgba(0,0,0,.2); }
    .ingredient-name { font-weight: 800; }
    .ingredient-name small { display: block; margin-top: 3px; color: #aee0bd; font-weight: 600; }
    .amount { color: #e2cd8e; white-space: nowrap; }
    mark { background: rgba(224, 214, 138, .28); color: #fff4be; padding: 0 2px; border-radius: 4px; }
    .empty { padding: 24px 26px; border-radius: 24px; color: #ddd3c8; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.14); line-height: 1.7; }
    @media (max-width: 720px) {
      .page { padding: 18px 14px 44px; }
      .hero { padding: 28px 22px; }
      .hero::after { font-size: 56px; right: 20px; top: 20px; }
      .search-row { grid-template-columns: 1fr; }
      button { width: 100%; }
      .results { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="eyebrow">🌿 WITCH BALM FORMULA BOOK</div>
      <h1>女巫精油膏配方書</h1>
      <p>輸入精油膏名稱或成分名稱，就能查詢可製作的精油膏與完整材料。</p>
    </section>

    <section class="panel">
      <label for="searchInput">搜尋精油膏名稱或成分名稱</label>
      <div class="search-row">
        <input id="searchInput" type="text" placeholder="例如：財富、檀香、Sandalwood、蜜蠟、荷荷巴油" autocomplete="off" />
        <button id="searchBtn" class="primary">搜尋</button>
        <button id="clearBtn" class="secondary">清除</button>
      </div>
      <div id="meta" class="meta">配方書準備中……</div>
      <div id="message" class="message" style="display:none;"></div>
    </section>

    <h2 class="section-title">🔮 查詢結果</h2>
    <section id="results" class="results"></section>
  </main>

  <script>
    // GitHub Pages 使用：請把 Potions-Formula.csv 放在 index.html 同一層。
    // 若本機直接雙擊 HTML，瀏覽器通常會阻擋讀取外部 CSV，因此下方有內建備用資料，避免預覽時壞掉。
    const CSV_PATH = './Potions-Formula.csv';
    const FALLBACK_CSV = `原料名稱,英文名稱,類型,財富藥膏,驅邪藥膏,無毒飛天藥膏#2,"《房間之主》

葵花油 Sunflower,,基底油,,,,
浸泡油,,基底油,,,,
金盞花油 Calendula,,基底油,,,,`;

    let recipes = [];

    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const clearBtn = document.getElementById('clearBtn');
    const meta = document.getElementById('meta');
    const message = document.getElementById('message');
    const results = document.getElementById('results');

    function normalize(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/\s+/g, '')
        .replace(/[，,、。．.｜|／/()（）「」『』《》#＃\-—_]/g, '');
    }

    function escapeHTML(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function showMessage(text, isError = false) {
      message.style.display = 'block';
      message.className = isError ? 'message error' : 'message';
      message.textContent = text;
    }

    function hideMessage() {
      message.style.display = 'none';
      message.textContent = '';
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = '';
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          cell += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          row.push(cell.trim());
          cell = '';
        } else if ((char === '
' || char === '') && !inQuotes) {
          if (char === '' && next === '
') i++;
          row.push(cell.trim());
          if (row.some(item => item !== '')) rows.push(row);
          row = [];
          cell = '';
        } else {
          cell += char;
        }
      }

      row.push(cell.trim());
      if (row.some(item => item !== '')) rows.push(row);
      return rows;
    }

    function buildRecipesFromWideCSV(csvText) {
      const rows = parseCSV(csvText);
      if (rows.length < 2) return [];

      const header = rows[0].map(item => item.trim());
      const recipeNames = header.slice(3).filter(Boolean);
      const recipeList = recipeNames.map(name => ({ name, ingredients: [] }));

      rows.slice(1).forEach(row => {
        const ingredientName = (row[0] || '').trim();
        const englishName = (row[1] || '').trim();
        const type = (row[2] || '').trim();
        if (!ingredientName) return;

        recipeNames.forEach((recipeName, index) => {
          const amount = (row[index + 3] || '').trim();
          if (!amount) return;

          recipeList[index].ingredients.push({
            name: ingredientName,
            englishName,
            type,
            amount
          });
        });
      });

      return recipeList.filter(recipe => recipe.ingredients.length > 0);
    }

    async function loadRecipes() {
      let csvText = '';

      try {
        const response = await fetch(`${CSV_PATH}?v=${Date.now()}`, { cache: 'no-store' });
        if (!response.ok) throw new Error('CSV not found');
        csvText = await response.text();
      } catch (error) {
        // 本機直接開 HTML 時，fetch 會失敗；此時使用內建備用資料，避免畫面壞掉。
        csvText = FALLBACK_CSV;
      }

      recipes = buildRecipesFromWideCSV(csvText);

      if (!recipes.length) {
        meta.textContent = '配方書尚未準備完成。';
        showMessage('目前讀不到可使用的配方資料，請確認配方表格式是否正確。', true);
        renderEmpty('目前無法搜尋，因為配方資料尚未成功讀取。');
        return;
      }

      const ingredientCount = new Set(
        recipes.flatMap(recipe => recipe.ingredients.map(item => normalize(item.name)))
      ).size;

      meta.textContent = `已收錄 ${recipes.length} 款精油膏、${ingredientCount} 筆原料`;
      hideMessage();
      renderEmpty(`可以搜尋：${recipes.map(item => item.name).join('、')}，或輸入任一成分名稱。`);
    }

    function searchRecipes() {
      const keyword = searchInput.value.trim();
      hideMessage();

      if (!recipes.length) {
        showMessage('配方書還沒準備好，請稍後再試一次。', true);
        return;
      }

      if (!keyword) {
        showMessage('請先輸入想查詢的精油膏名稱或成分名稱。');
        searchInput.focus();
        return;
      }

      const key = normalize(keyword);
      const matched = recipes.filter(recipe => {
        const recipeNameMatched = normalize(recipe.name).includes(key);
        const ingredientMatched = recipe.ingredients.some(item =>
          normalize(item.name).includes(key) ||
          normalize(item.englishName).includes(key) ||
          normalize(item.type).includes(key)
        );
        return recipeNameMatched || ingredientMatched;
      });

      if (!matched.length) {
        renderEmpty(`目前找不到與「${escapeHTML(keyword)}」相關的精油膏。可以改用精油膏名稱、中文成分名稱或英文成分名稱搜尋。`);
        return;
      }

      renderRecipes(matched, keyword);
    }

    function renderRecipes(recipeList, keyword) {
      results.innerHTML = recipeList.map(recipe => `
        <article class="card">
          <h3>${highlight(recipe.name, keyword)}</h3>
          <div class="tags">
            ${recipe.ingredients.slice(0, 6).map(item => `<span class="tag">${escapeHTML(item.type || '原料')}</span>`).join('')}
          </div>
          <ul class="ingredient-list">
            ${recipe.ingredients.map(item => `
              <li>
                <span class="ingredient-name">
                  ${highlight(item.name, keyword)}
                  ${item.englishName ? `<small>${highlight(item.englishName, keyword)}</small>` : ''}
                </span>
                <span class="amount">${escapeHTML(item.amount)}</span>
              </li>
            `).join('')}
          </ul>
        </article>
      `).join('');
    }

    function highlight(text, keyword) {
      const safeText = escapeHTML(text);
      if (!keyword) return safeText;
      const trimmed = keyword.trim();
      if (!trimmed) return safeText;

      // 為了避免特殊符號造成正規表示式錯誤，先跳脫查詢字串。
      const escapedKeyword = trimmed.replace(/[.*+?^${}()|[\]\]/g, '\$&');
      try {
        return safeText.replace(new RegExp(escapedKeyword, 'gi'), match => `<mark>${match}</mark>`);
      } catch (error) {
        return safeText;
      }
    }

    function renderEmpty(text) {
      results.innerHTML = `<div class="empty">${text}</div>`;
    }

    searchBtn.addEventListener('click', searchRecipes);
    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      hideMessage();
      renderEmpty(`可以搜尋：${recipes.map(item => item.name).join('、')}，或輸入任一成分名稱。`);
      searchInput.focus();
    });
    searchInput.addEventListener('keydown', event => {
      if (event.key === 'Enter') searchRecipes();
    });

    loadRecipes();
  </script>
</body>
</html>
